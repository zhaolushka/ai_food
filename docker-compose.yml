version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: foodbridge-postgres
    environment:
      POSTGRES_USER: foodbridge
      POSTGRES_PASSWORD: foodbridge
      POSTGRES_DB: foodbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: foodbridge-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: foodbridge-backend
    environment:
      PORT: 4000
      DATABASE_URL: postgres://foodbridge:foodbridge@postgres:5432/foodbridge
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  ai-service:
    build:
      context: ./ai-service
    container_name: foodbridge-ai
    environment:
      PORT: 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: foodbridge-frontend
    environment:
      PORT: 3000
      BACKEND_URL: http://backend:4000
      AI_URL: http://ai-service:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - ai-service

volumes:
  postgres_data:
